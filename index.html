<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Profils Travailleurs</title>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<style>
body { margin:0; font-family: 'Segoe UI', sans-serif; background:#0f172a; color:#fff; }
.container { max-width:900px; margin:auto; padding:20px; }
input, select, textarea { width:100%; padding:10px; margin:8px 0; border-radius:8px; border:none; background:#1e293b; color:white; }
textarea{ resize:none; }
button { padding:10px 20px; border:none; border-radius:8px; margin-top:10px; cursor:pointer; font-weight:bold; display:flex; align-items:center; gap:8px; }
.primary{ background:#2563eb; color:white; }
.success{ background:#16a34a; color:white; }
.danger{ background:#dc2626; color:white; }
.premium{ background:gold; color:black; animation:blink 1s infinite; }
@keyframes blink{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}
.profile-card{ background:#1e293b; padding:15px; border-radius:15px; margin-top:20px; position:relative; overflow:hidden; }
.profile-card img{ width:120px; height:120px; border-radius:50%; object-fit:cover; animation:float 3s ease-in-out infinite; }
@keyframes float{0%{transform: translateY(0px);}50%{transform: translateY(-10px);}100%{transform: translateY(0px);} }
.chat-box{ background:#1e293b; padding:15px; border-radius:10px; margin-top:20px; max-height:300px; overflow-y:auto; }
.chat-message{ background:#2563eb; padding:8px 12px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; }
.chat-message.admin{ background:#16a34a; }
.popup{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:1000; }
.popup-content{ background:#1e293b; padding:20px; border-radius:10px; text-align:center; }
.hidden{ display:none; }
.admin-table{ width:100%; border-collapse: collapse; margin-top:20px; }
.admin-table th, .admin-table td{ padding:10px; border:1px solid #333; text-align:center; }
.search-bar{ width:100%; padding:10px; border-radius:8px; border:none; margin-top:10px; background:#1e293b; color:white; }
.nav-buttons{ display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
</style>
</head>
<body>

<div class="container">

<h2><i class="fas fa-user-plus"></i> Connexion / Créer un compte</h2>
<div id="auth">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">
<button class="primary" onclick="register()"><i class="fas fa-user-plus"></i> Créer</button>
<button class="success" onclick="login()"><i class="fas fa-sign-in-alt"></i> Connexion</button>
</div>

<div id="profileForm" class="hidden">
<h2><i class="fas fa-id-badge"></i> Créer votre profil</h2>
<select id="statut">
<option>Chômeur</option>
<option>Commerçant</option>
<option>Entrepreneur</option>
<option>Influenceur</option>
<option>Technicien</option>
<option>Personnalité publique</option>
</select>
<input type="text" id="profession" placeholder="Profession">
<input type="text" id="phone1" placeholder="Téléphone 1">
<input type="text" id="phone2" placeholder="Téléphone 2">
<input type="text" id="ville" placeholder="Ville">
<input type="text" id="quartier" placeholder="Quartier">
<input type="number" id="age" placeholder="Age">
<input type="file" id="photo">
<input type="text" id="website" placeholder="Site web (facultatif)">
<button class="primary" onclick="saveProfile()"><i class="fas fa-save"></i> Valider</button>

<div class="nav-buttons">
<button class="primary" onclick="showProfile()"><i class="fas fa-user"></i> Mon Profil</button>
<button class="primary" onclick="showChat()"><i class="fas fa-comments"></i> Chat Public</button>
<button class="success" onclick="adminLogin()"><i class="fas fa-user-shield"></i> Admin</button>
</div>
</div>

<div id="profileDisplay"></div>

<div id="chatSection" class="hidden">
<h2><i class="fas fa-comments"></i> Chat Public</h2>
<div class="chat-box" id="chatBox"></div>
<textarea id="chatMessage" placeholder="Écrire un message..." rows="3"></textarea>
<button class="primary" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Envoyer</button>
<button class="danger" onclick="showProfile()"><i class="fas fa-arrow-left"></i> Retour Profil</button>
</div>

<div class="popup" id="popup">
<div class="popup-content">
<h3><i class="fas fa-star"></i> Version Premium requise</h3>
<p>Pour participer au chat public, payez 500F</p>
<button class="success" onclick="payPremium()"><i class="fas fa-whatsapp"></i> Contacter Admin</button>
<button class="danger" onclick="closePopup()"><i class="fas fa-times"></i> Retour</button>
</div>
</div>

<div id="adminSection" class="hidden">
<h2><i class="fas fa-user-shield"></i> Tableau Administrateur</h2>
<input type="password" id="adminCode" class="search-bar" placeholder="Code Admin">
<button class="primary" onclick="loadAdminProfiles()"><i class="fas fa-search"></i> Valider</button>
<input type="text" id="searchUser" class="search-bar" placeholder="Rechercher utilisateur..." onkeyup="filterAdminTable()">
<table class="admin-table" id="adminTable">
<tr>
<th>Email</th><th>Statut</th><th>Ville</th><th>Premium</th><th>Bloqué</th><th>Actions</th>
</tr>
</table>
</div>

</div>

<script>
let currentUser = null;
const defaultPhoto = "https://raw.githubusercontent.com/Lfg237/m-dias/main/Screenshot_20260302-170127.jpg";
let profiles = [];
let chat = [];

function register(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if(!email || !password){ alert("Remplissez tous les champs"); return; }
    fetch('/api/saveProfile.js',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email,password,public:true,premium:false,blocked:false,followers:[]})
    }).then(()=>{ alert("Compte créé !"); currentUser=email; document.getElementById("auth").classList.add('hidden'); document.getElementById("profileForm").classList.remove('hidden'); });
}

function login(){
    const email = document.getElementById("email").value;
    currentUser = email;
    document.getElementById("auth").classList.add('hidden');
    document.getElementById("profileForm").classList.remove('hidden');
    loadProfile();
    loadChat();
}

function saveProfile(){
    const reader = new FileReader();
    const file = document.getElementById("photo").files[0];
    reader.onload = function(){
        const profile = {
            email: currentUser,
            statut: statut.value,
            profession: profession.value,
            phone1: phone1.value,
            phone2: phone2.value,
            ville: ville.value,
            quartier: quartier.value,
            age: age.value,
            website: website.value,
            photo: file ? reader.result : defaultPhoto,
            public:true,
            premium:false,
            blocked:false,
            followers:[]
        };
        fetch('/api/saveProfile.js',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(profile)
        }).then(()=>{ displayProfile(profile); alert("Profil sauvegardé !"); });
    }
    if(file){ reader.readAsDataURL(file); }else{ reader.onload(); }
}

function loadProfile(){
    fetch('/api/getProfiles.js')
    .then(res=>res.json())
    .then(data=>{
        profiles = data;
        const profile = profiles.find(p=>p.email===currentUser);
        if(profile) displayProfile(profile);
    });
}

function displayProfile(profile){
    document.getElementById("profileDisplay").innerHTML = `
    <div class="profile-card">
        <img src="${profile.photo}">
        <p><b>Statut:</b> ${profile.statut}</p>
        <p><b>Profession:</b> ${profile.profession}</p>
        <p><b>Téléphone 1:</b> ${profile.phone1}</p>
        <p><b>Téléphone 2:</b> ${profile.phone2}</p>
        <p><b>Ville:</b> ${profile.ville}</p>
        <p><b>Quartier:</b> ${profile.quartier}</p>
        <p><b>Age:</b> ${profile.age}</p>
        <p><b>Site:</b> ${profile.website}</p>
        <p><b>Statut profil:</b> ${profile.public ? "Public" : "Privé"}</p>
        <p><b>Abonnés:</b> ${profile.followers.length}</p>
        <button class="premium" onclick="openPopup()"><i class="fas fa-star"></i> Premium</button>
    </div>`;
}

function showChat(){ document.getElementById("profileDisplay").classList.add('hidden'); document.getElementById("chatSection").classList.remove('hidden'); loadChat();}
function showProfile(){ document.getElementById("chatSection").classList.add('hidden'); document.getElementById("profileDisplay").classList.remove('hidden');}

function sendMessage(){
    fetch('/api/getProfiles.js').then(r=>r.json()).then(data=>{
        const profile = data.find(p=>p.email===currentUser);
        if(!profile.premium){ openPopup(); return; }
        const message = document.getElementById("chatMessage").value;
        if(!message) return;
        fetch('/api/saveMessage.js',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({user:currentUser,message})
        }).then(()=>{ document.getElementById("chatMessage").value=""; loadChat(); });
    });
}

function loadChat(){
    fetch('/api/getMessages.js').then(r=>r.json()).then(data=>{
        chat = data;
        const box = document.getElementById("chatBox");
        box.innerHTML="";
        chat.forEach(c=>{
            const profile = profiles.find(p=>p.email===c.user);
            if(profile && profile.premium){ 
                const div = document.createElement("div"); 
                div.className="chat-message"; 
                div.innerHTML=`<b>${c.user}:</b> ${c.message}`; 
                box.appendChild(div);
            }
        });
    });
}

function openPopup(){ document.getElementById("popup").style.display="flex"; }
function closePopup(){ document.getElementById("popup").style.display="none"; }
function payPremium(){ window.open(`https://wa.me/237670035609?text=Je souhaite passer en version Premium:%0AEmail:${currentUser}`,"_blank"); }

function adminLogin(){ const code = prompt("Code Admin"); if(code==='2332333'){ document.getElementById("adminSection").classList.remove('hidden'); loadAdminProfiles(); }else{ alert("Code incorrect"); } }

function loadAdminProfiles(){
    fetch('/api/getProfiles.js').then(r=>r.json()).then(data=>{ profiles=data; renderAdminTable(profiles); });
}

function renderAdminTable(profiles){
    const table = document.getElementById("adminTable");
    table.innerHTML=`<tr><th>Email</th><th>Statut</th><th>Ville</th><th>Premium</th><th>Bloqué</th><th>Actions</th></tr>`;
    profiles.forEach(p=>{
        const tr = document.createElement("tr");
        tr.innerHTML=`<td>${p.email}</td><td>${p.statut}</td><td>${p.ville}</td>
        <td>${p.premium}</td><td>${p.blocked}</td>
        <td>
        <button onclick="validatePremium('${p.email}')">Valider Premium</button>
        <button onclick="toggleBlock('${p.email}')">Bloquer/Débloquer</button>
        </td>`;
        table.appendChild(tr);
    });
}

function filterAdminTable(){
    const term = document.getElementById("searchUser").value.toLowerCase();
    const filtered = profiles.filter(p=>p.email.toLowerCase().includes(term)||p.statut.toLowerCase().includes(term)||p.ville.toLowerCase().includes(term));
    renderAdminTable(filtered);
}

function validatePremium(email){ fetch('/api/validatePremium.js',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})}).then(()=>loadAdminProfiles()); }
function toggleBlock(email){ fetch('/api/blockUser.js',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})}).then(()=>loadAdminProfiles()); }
</script>
</body>
</html>
